<div class="flex h-screen bg-gray-100 overflow-hidden">

  <!-- SUCCESS POPUP -->
  <div *ngIf="successMessage"
    class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-sm w-full mx-4 text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-[#1a2b4a] mb-2">User Registered!</h3>
      <p class="text-gray-500 text-sm mb-6">{{ successMessage }}</p>
      <div class="flex gap-3">
        <button (click)="successMessage = ''"
          class="flex-1 border border-gray-300 text-gray-600 hover:bg-gray-50 font-medium py-2.5 rounded-lg text-sm transition">
          Register Another
        </button>
        <button (click)="goToDashboard()"
          class="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg text-sm transition">
          Go to Dashboard
        </button>
      </div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="w-72 bg-[#1a2b4a] flex flex-col flex-shrink-0">
    <div class="px-6 py-5 border-b border-[#2a3f6a]">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-orange-500 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7l-9-5z"/>
          </svg>
        </div>
        <div>
          <p class="text-white font-bold text-lg">WorkSure</p>
          <p class="text-gray-400 text-xs">Admin Portal</p>
        </div>
      </div>
    </div>

    <nav class="flex-1 px-4 py-6 space-y-1">
      <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider px-3 mb-3">Main</p>

      <button (click)="goToDashboard()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-[#2a3f6a] transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z" />
        </svg>
        Dashboard
      </button>

      <p class="text-gray-500 text-xs font-semibold uppercase tracking-wider px-3 mt-5 mb-3">Operations</p>

      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-orange-500 text-white font-semibold">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7.5v3m0 0v3m0-3h3m-3 0h-3m-2.25-4.125a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM4 19.235v-.11a6.375 6.375 0 0112.75 0v.109A12.318 12.318 0 0110.374 21c-2.331 0-4.512-.645-6.374-1.766z" />
        </svg>
        Register User
      </button>

      <button class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-gray-300 hover:bg-[#2a3f6a] transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>
        Policies
        <span class="ml-auto text-xs bg-gray-600 text-gray-300 px-2 py-0.5 rounded-full">Soon</span>
      </button>
    </nav>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 flex flex-col overflow-hidden">

    <!-- TOP NAVBAR -->
    <header class="bg-white border-b border-gray-200 px-8 py-4 flex justify-between items-center flex-shrink-0">
      <div>
        <h1 class="text-2xl font-bold text-[#1a2b4a]">Register User</h1>
        <p class="text-gray-500 text-sm">Welcome back, {{ adminName }}</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-3 bg-[#1a2b4a] text-white px-4 py-2 rounded-lg">
          <div class="w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center font-bold text-sm">
            {{ initials }}
          </div>
          <div>
            <p class="font-semibold text-sm">{{ adminName }}</p>
            <p class="text-gray-400 text-xs">{{ adminRole }}</p>
          </div>
        </div>
        <button (click)="logout()"
          class="flex items-center gap-2 border border-orange-400 text-orange-500 hover:bg-orange-50 px-4 py-2 rounded-lg text-sm font-medium transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
          </svg>
          Logout
        </button>
      </div>
    </header>

    <!-- CONTENT -->
    <main class="flex-1 overflow-y-auto p-8">

      <!-- Back Button -->
      <button (click)="goToDashboard()"
        class="flex items-center gap-2 text-gray-500 hover:text-[#1a2b4a] text-sm mb-6 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        Back to Dashboard
      </button>

      <!-- Form Card -->
      <div class="max-w-lg bg-white rounded-xl shadow-sm border border-gray-100 p-8">
        <h2 class="text-xl font-bold text-[#1a2b4a] mb-1">Register New User</h2>
        <p class="text-gray-500 text-sm mb-6">Add an agent or claims manager to the platform</p>

        <!-- Error only (success is now a popup) -->
        <div *ngIf="errorMessage"
          class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-5 flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
          </svg>
          {{ errorMessage }}
        </div>

        <!-- Full Name -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-[#1a2b4a] mb-2">Full Name</label>
          <input type="text" [(ngModel)]="fullName" placeholder="Enter full name"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white" />
        </div>

        <!-- Email -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-[#1a2b4a] mb-2">Email Address</label>
          <input type="email" [(ngModel)]="email" placeholder="Enter email address"
            class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white" />
        </div>

        <!-- Password -->
        <div class="mb-5">
          <label class="block text-sm font-semibold text-[#1a2b4a] mb-2">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" placeholder="Enter password"
              class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white pr-12" />
            <button type="button" (click)="togglePassword()"
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Role Selection -->
        <div class="mb-6">
          <label class="block text-sm font-semibold text-[#1a2b4a] mb-2">Role</label>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" (click)="role = 'Agent'"
              [class]="role === 'Agent' ?
                'border-2 border-orange-500 bg-orange-50 rounded-lg px-4 py-3 text-sm font-semibold text-orange-600' :
                'border-2 border-gray-200 rounded-lg px-4 py-3 text-sm font-medium text-gray-600 hover:border-orange-300 transition'">
              Users Agent
            </button>
            <button type="button" (click)="role = 'ClaimsManager'"
              [class]="role === 'ClaimsManager' ?
                'border-2 border-orange-500 bg-orange-50 rounded-lg px-4 py-3 text-sm font-semibold text-orange-600' :
                'border-2 border-gray-200 rounded-lg px-4 py-3 text-sm font-medium text-gray-600 hover:border-orange-300 transition'">
              Clipboard Claims Manager
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button (click)="onSubmit()" [disabled]="isLoading"
          class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-lg transition text-sm disabled:opacity-60">
          {{ isLoading ? 'Registering...' : 'Register User' }}
        </button>
      </div>

    </main>
  </div>
</div>
